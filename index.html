<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HACKERS - Dead & Injured</title>

    <!-- STYLE FILE -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>HACKERS</h1>
        <p>Dead & Injured Code Battle</p>

        <!-- SETUP SCREEN -->
        <div id="setupScreen">
            <h3>Enter Your Secret Code</h3>
            <p>4 digits (no repeats)</p>

            <input type="text" id="playerCode" maxlength="4">
            <button onclick="startGame()">Start Game</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" style="display:none;">

            <h3 id="turnText">Player Turn</h3>

            <input type="text" id="guessInput" maxlength="4">
            <button onclick="makeGuess()">Guess</button>

            <p id="result"></p>

            <div class="board">
                <h4>Player Board</h4>
                <div id="playerBoard"></div>
            </div>

            <div class="board">
                <h4>COM Board</h4>
                <div id="comBoard"></div>
            </div>

        </div>

        <!-- WIN SCREEN -->
        <div id="winScreen" style="display:none;">
            <h2 id="winText"></h2>
            <button onclick="location.reload()">Play Again</button>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script src="game.js"></script>
    <script src="ai.js"></script>
    <script src="score.js"></script>

</body>
</html>
