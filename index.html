<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HACKERS - Dead & Injured</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>HACKERS</h1>
    <p>Dead & Injured Code Battle</p>

    <div id="setupScreen" class="box">
        <h3>Enter Your Secret Code</h3>
        <input type="text" id="playerCode" maxlength="4">
        <br>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="gameScreen" class="box" style="display:none;">

        <h3 id="turnText">PLAYER TURN</h3>

        <input type="text" id="guessInput" maxlength="4">
        <button onclick="makeGuess()">GUESS</button>

        <p id="result"></p>

        <div class="board">
            <h4>Player Board</h4>
            <div id="playerBoard"></div>
        </div>

        <div class="board">
            <h4>COM Board</h4>
            <div id="comBoard"></div>
        </div>

    </div>

    <div id="winScreen" class="box" style="display:none;">
        <h2 id="winText"></h2>
        <button onclick="location.reload()">Play Again</button>
    </div>

</div>

<script src="ai.js"></script>
<script src="game.js"></script>

</body>
</html>
